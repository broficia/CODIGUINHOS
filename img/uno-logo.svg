<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8001D"/>
      <stop offset="100%" style="stop-color:#b50016"/>
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="120" height="60" rx="12" fill="url(#bg)"/>
  <!-- Inner oval -->
  <ellipse cx="60" cy="30" rx="45" ry="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- UNO text -->
  <text x="60" y="40" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">UNO</text>
  <!-- TM -->
  <text x="108" y="18" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,215,0,0.9)" text-anchor="middle">™</text>
</svg>
