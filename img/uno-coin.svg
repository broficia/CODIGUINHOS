<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="coin" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </radialGradient>
    <radialGradient id="coinShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Coin shadow -->
  <ellipse cx="40" cy="74" rx="28" ry="5" fill="rgba(0,0,0,0.2)"/>
  <!-- Coin body -->
  <circle cx="40" cy="38" r="34" fill="#B8860B"/>
  <circle cx="40" cy="36" r="32" fill="url(#coin)"/>
  <!-- Shine -->
  <circle cx="40" cy="36" r="32" fill="url(#coinShine)"/>
  <!-- Inner ring -->
  <circle cx="40" cy="36" r="26" fill="none" stroke="rgba(184,134,11,0.4)" stroke-width="1.5"/>
  <!-- UNO text on coin -->
  <text x="40" y="32" font-family="Arial Black,sans-serif" font-size="13" font-weight="900" fill="#8B6914" text-anchor="middle" letter-spacing="1">UNO</text>
  <text x="40" y="46" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#8B6914" text-anchor="middle" letter-spacing="0.5">COIN</text>
</svg>
