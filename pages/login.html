<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Entrar – UNO!™</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo"><span class="logo-text">UNO!</span><span class="logo-tm">™</span></a>
    <div class="nav-right" style="margin-left:auto">
      <div class="nav-auth-btns"><a href="register.html" class="btn-rn">CRIAR CONTA</a></div>
    </div>
  </div>
</nav>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-text">UNO!</span><span class="logo-tm">™</span><p>Entre e continue jogando</p></div>
    <h2 class="auth-title">Bem-vindo de volta!</h2>
    <p class="auth-sub">Faça login para acessar sua conta</p>
    <form onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label">E-MAIL</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="seu@email.com" autocomplete="email">
        <span class="form-error" id="loginEmailError"></span>
      </div>
      <div class="form-group">
        <label class="form-label">SENHA</label>
        <div class="input-group">
          <input type="password" id="loginPass" class="form-input" placeholder="Sua senha" autocomplete="current-password">
          <button type="button" class="input-toggle" onclick="togglePassword('loginPass')">👁</button>
        </div>
        <span class="form-error" id="loginPassError"></span>
      </div>
      <a href="#" class="forgot-link" onclick="alert('Recuperação por e-mail em breve!');return false;">Esqueceu a senha?</a>
      <button type="submit" class="btn-full btn-red" id="btnLogin">ENTRAR</button>
    </form>
    <div class="auth-divider">ou entre com</div>
    <div class="social-btns">
      <button class="btn-social" onclick="alert('Login social em breve!')">🔵 Google</button>
      <button class="btn-social" onclick="alert('Login social em breve!')">🔷 Facebook</button>
    </div>
    <p class="auth-footer-link">Não tem conta? <a href="register.html">Cadastre-se grátis</a></p>
  </div>
</div>
<script src="../js/auth.js"></script>
<script>if(getUser())window.location.href='dashboard.html';</script>
</body>
</html>
